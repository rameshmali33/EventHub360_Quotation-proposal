name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eventhub360_ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
